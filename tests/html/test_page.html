<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Test Page</title>
    <script>
        // Inline consoleShim.js
        (function() {
            var originalConsole = {
                error: console.error,
                warn: console.warn,
                info: console.info,
                log: console.log
            };

            function sendToMatlab(level, args) {
                var message = Array.prototype.map.call(args, function(arg) {
                    if (arg instanceof Error) {
                        return arg.message;
                    } else if (typeof arg === 'object') {
                        try {
                            return JSON.stringify(arg);
                        } catch (e) {
                            return String(arg);
                        }
                    } else {
                        return String(arg);
                    }
                }).join(' ');

                var stack = '';
                if (args[0] instanceof Error && args[0].stack) {
                    stack = args[0].stack;
                } else {
                    try {
                        throw new Error();
                    } catch (e) {
                        if (e.stack) {
                            stack = e.stack;
                        }
                    }
                }

                if (window.sendEventToMATLAB) {
                    window.sendEventToMATLAB("ConsoleError", {
                        level: level,
                        message: message,
                        stack: stack
                    });
                }
            }

            console.error = function() {
                sendToMatlab('error', arguments);
                if (originalConsole.error) {
                    originalConsole.error.apply(console, arguments);
                }
            };

            console.warn = function() {
                sendToMatlab('warn', arguments);
                if (originalConsole.warn) {
                    originalConsole.warn.apply(console, arguments);
                }
            };

            console.info = function() {
                sendToMatlab('info', arguments);
                if (originalConsole.info) {
                    originalConsole.info.apply(console, arguments);
                }
            };

            console.log = function() {
                sendToMatlab('log', arguments);
                if (originalConsole.log) {
                    originalConsole.log.apply(console, arguments);
                }
            };
        })();
    </script>
</head>
<body>
    <div id="status">Ready</div>
    <script>
        function triggerTestError(msg) {
            console.error(msg || "Test Error");
        }
        function triggerTestWarn(msg) {
            console.warn(msg || "Test Warn");
        }
        function triggerTestInfo(msg) {
            console.info(msg || "Test Info");
        }
        function setupMatlabCallback() {
            if (window.setupMATLABCallback) {
                window.setupMATLABCallback(function(data) {
                    if (data && data.action) {
                        switch(data.action) {
                            case 'error': triggerTestError(data.message); break;
                            case 'warn': triggerTestWarn(data.message); break;
                            case 'info': triggerTestInfo(data.message); break;
                        }
                    }
                });
            }
        }
        setupMatlabCallback();
    </script>
</body>
</html>
