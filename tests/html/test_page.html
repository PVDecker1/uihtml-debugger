<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Test Page</title>
</head>
<body>
    <div id="status">Ready</div>
    <script>
        function triggerTestError(msg) {
            console.error(msg || "Test Error");
        }
        function triggerTestWarn(msg) {
            console.warn(msg || "Test Warn");
        }
        function triggerTestInfo(msg) {
            console.info(msg || "Test Info");
        }
        function setupMatlabCallback() {
            if (window.setupMATLABCallback) {
                window.setupMATLABCallback(function(data) {
                    if (data && data.action) {
                        switch(data.action) {
                            case 'error': triggerTestError(data.message); break;
                            case 'warn': triggerTestWarn(data.message); break;
                            case 'info': triggerTestInfo(data.message); break;
                        }
                    }
                });
            }
        }
        setupMatlabCallback();
    </script>
</body>
</html>
