<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Test Page</title>
</head>
<body>
    <div id="status">Ready</div>
    <script>
        // Standard MATLAB UIHTML setup function
        function setup(htmlComponent) {
            console.log("Test Page Ready.");
            // Send a custom event so MATLAB knows we are ready
            htmlComponent.sendEventToMATLAB("Ready", {});

            // Listen for the event sent from MATLAB
            htmlComponent.addEventListener("triggerTest", function(event) {
                const data = event.Data;
                triggerTest(data.level, data.msg);
            });
        }

        function triggerTest(level, msg) {
            console[level](msg);
        }

        function triggerTestError(msg) {
            console.error(msg || "Test Error");
        }
        function triggerTestWarn(msg) {
            console.warn(msg || "Test Warn");
        }
        function triggerTestInfo(msg) {
            console.info(msg || "Test Info");
        }
    </script>
</body>
</html>
